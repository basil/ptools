---
version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    cooldown:
      default-days: 30
    labels:
      - 'Type: Dependencies'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    cooldown:
      default-days: 30
    labels:
      - 'Type: Dependencies'
